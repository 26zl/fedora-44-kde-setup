name: Validate Configs

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate config files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check no plaintext passwords or IPs in configs
        run: |
          echo "Checking for sensitive patterns..."
          # Fail if any private IPv4 ranges hardcoded (except localhost)
          if grep -rE '(192\.168\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+)' \
            --include="*.conf" --include="*.toml" --include="*.sh" --include="*.desktop" .; then
            echo "WARNING: Hardcoded private IP found — remove before committing"
            exit 1
          fi
          echo "No hardcoded IPs found."

      - name: Validate TOML files
        run: |
          pip install tomli --quiet
          for f in $(find . -name "*.toml" -not -path "./.git/*"); do
            echo "Validating $f"
            python3 -c "import tomli; tomli.load(open('$f','rb'))" && echo "  OK" || exit 1
          done

      - name: Check shell scripts are executable-safe
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "$f: syntax OK" || exit 1
          done
