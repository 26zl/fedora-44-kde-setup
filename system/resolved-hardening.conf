[Resolve]
# no forced resolver: DNS follows the active link (Mullvad tunnel when connected, DHCP otherwise)
# forcing a global resolver (DNS= + Domains=~.) leaked queries to a third party through the VPN
# FallbackDNS is used only when no link DNS is known (e.g. the brief gap when the VPN drops),
# so it never overrides Mullvad and never leaks through the tunnel
FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
