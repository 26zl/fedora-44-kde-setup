# Deployed to /etc/systemd/system/tmp.mount.d/override.conf
# Drop usrquota: systemd 256+ mounts /tmp with an automatic ~12G per-user
# quota, so writes fail with "Disk quota exceeded" before /tmp is full.
# Pointless on a single-user box. Keeps nosuid/nodev/size, drops usrquota.
[Mount]
Options=mode=1777,strictatime,nosuid,nodev,size=50%%,nr_inodes=1m
