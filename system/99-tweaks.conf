vm.swappiness=150
vm.max_map_count=2147483642
net.core.rmem_max=16777216
net.core.wmem_max=16777216
vm.compaction_proactiveness=0
vm.page_lock_unfairness=1
fs.inotify.max_user_instances=512
# hide kernel symbol addresses from unprivileged users
kernel.kptr_restrict=1
# harden BPF JIT compiler
net.core.bpf_jit_harden=2
# protect FIFOs and regular files from symlink/hardlink race attacks
fs.protected_fifos=2
fs.protected_regular=2
# prevent auto-loading of TTY line discipline modules
dev.tty.ldisc_autoload=0
# log packets with impossible source addresses
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1
# drop packets with impossible source addresses (anti-spoofing)
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.default.rp_filter=1
