conky.config = {
    alignment        = 'top_left',
    xinerama_head    = 1,
    gap_x            = 30,
    gap_y            = 30,
    minimum_width    = 260,
    maximum_width    = 260,

    own_window             = true,
    own_window_type        = 'normal',
    own_window_hints       = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value  = 0,
    own_window_colour      = '#000000',

    double_buffer    = true,
    no_buffers       = true,

    use_xft          = true,
    font             = 'JetBrainsMono Nerd Font:size=9',
    xftalpha         = 1,

    update_interval  = 2,
    cpu_avg_samples  = 4,
    net_avg_samples  = 2,

    default_color    = '#5a6870',
    color0           = '#007a6a',
    color1           = '#881414',
    color2           = '#00a898',
    color3           = '#0d1e1a',
    color4           = '#90a8a0',

    draw_shades      = false,
    draw_borders     = false,
    draw_graph_borders = false,
    uppercase        = false,
    use_spacer       = 'none',
    short_units      = true,
}

conky.text = [[
${color2}${font JetBrainsMono Nerd Font:size=32}${time %H:%M}${font}
${color0}${execi 60 LANG=C date '+%A, %d %B %Y'}

${color0}SYSTEM
${color4}  ${kernel}
${color4}  uptime ${uptime}

${color0}CPU  ${color4}Ryzen 9 9900X
${color0}  load   ${color4}${cpu cpu0}%  ${color0}freq  ${color4}${freq_g}GHz
${color0}  temp   ${color4}${exec sensors | grep 'Tctl:' | awk '{print $2}'}
${color0}  1-4    ${color4}${cpu cpu1}% ${cpu cpu2}% ${cpu cpu3}% ${cpu cpu4}%
${color0}  5-8    ${color4}${cpu cpu5}% ${cpu cpu6}% ${cpu cpu7}% ${cpu cpu8}%
${color0}  9-12   ${color4}${cpu cpu9}% ${cpu cpu10}% ${cpu cpu11}% ${cpu cpu12}%

${color0}GPU  ${color4}RTX 5070
${color0}  temp   ${color4}${exec nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C
${color0}  load   ${color4}${exec nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader}
${color0}  vram   ${color4}${exec nvidia-smi --query-gpu=memory.used --format=csv,noheader} / ${exec nvidia-smi --query-gpu=memory.total --format=csv,noheader}

${color0}MEMORY
${color0}  ram    ${color4}${mem} / ${memmax}
${color3}${membar 4,260}
${color0}  zram   ${color4}${swap} / ${swapmax}

${color0}DISK
${color0}  root   ${color4}${fs_used /} / ${fs_size /}
${color3}${fs_bar 4,260 /}
${color0}  data   ${color4}${fs_used /mnt/data} / ${fs_size /mnt/data}

${color0}NETWORK
${color0}  ip     ${color4}${addr enp14s0}
${color0}  down   ${color1}${downspeed enp14s0}   ${color0}up   ${color1}${upspeed enp14s0}

${color0}PROCESSES  ${color4}${running_processes}/${processes}
  ${color4}${top name 1} ${color1}${top cpu 1}%
  ${color4}${top name 2} ${color1}${top cpu 2}%
  ${color4}${top name 3} ${color1}${top cpu 3}%
]]
