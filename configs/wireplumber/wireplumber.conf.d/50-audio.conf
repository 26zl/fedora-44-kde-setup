monitor.alsa.rules = [
  # disable: Radeon HDMI, Ryzen S/PDIF, Trust webcam
  {
    matches = [
      { node.name = "~alsa_output.pci-0000_79_00.1.*" }
      { node.name = "~alsa_input.pci-0000_79_00.1.*" }
      { node.name = "~alsa_output.pci-0000_79_00.6.*" }
      { node.name = "~alsa_input.pci-0000_79_00.6.*" }
      { node.name = "~alsa_output.usb-SC_Trust_QHD_Webcam.*" }
      { node.name = "~alsa_input.usb-SC_Trust_QHD_Webcam.*" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  # NVIDIA HDMI — disable unconnected outputs
  {
    matches = [
      { node.name = "alsa_output.pci-0000_01_00.1.pro-output-8" }
      { node.name = "alsa_output.pci-0000_01_00.1.pro-output-9" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  # NVIDIA HDMI — names + stereo fix (pro-audio defaults to aux0/aux1)
  {
    matches = [
      { node.name = "alsa_output.pci-0000_01_00.1.pro-output-3" }
    ]
    actions = {
      update-props = {
        node.description  = "MAG 27CQ6F (DP 1)"
        audio.channels    = 2
        audio.position    = "[ FL, FR ]"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_01_00.1.pro-output-7" }
    ]
    actions = {
      update-props = {
        node.description  = "ASUS VG27W (DP 2)"
        audio.channels    = 2
        audio.position    = "[ FL, FR ]"
      }
    }
  }
]
