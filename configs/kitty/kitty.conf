shell /usr/bin/fish

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Performance
sync_to_monitor  yes
repaint_delay    8
input_delay      1

# Appearance
background            #090909
foreground            #b0bec5
selection_background  #1a2e2a
selection_foreground  #e0e0e0
cursor                #00c8a8
cursor_text_color     #090909
url_color             #00c8a8

# Colors — black, teal, red
color0  #1a1a1a
color1  #cc2222
color2  #00c8a8
color3  #d4a017
color4  #1de9b6
color5  #8b1a1a
color6  #00b4a0
color7  #b0bec5
color8  #2a2a2a
color9  #ff3333
color10 #1de9b6
color11 #f0c040
color12 #00e5c8
color13 #aa2222
color14 #00cec9
color15 #eceff1

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5

# Window
background_opacity    0.95
window_padding_width  8
hide_window_decorations no
remember_window_size  yes

# Tabs
tab_bar_style         powerline
tab_powerline_style   slanted
active_tab_foreground   #090909
active_tab_background   #00c8a8
inactive_tab_foreground #606878
inactive_tab_background #111111

# Shell integration
shell_integration     enabled

# Scrollback
scrollback_lines      10000

# URL handling
open_url_with         default
detect_urls           yes

# Clipboard
copy_on_select        yes

# Keybindings
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+w      close_tab
map ctrl+tab          next_tab
map ctrl+shift+tab    previous_tab
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

# Wayland
linux_display_server  wayland
